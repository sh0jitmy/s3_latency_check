name: S3 Latency Test

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  latency-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup SOPS
        uses: nhedger/setup-sops@187c90dbb4e28c3225263886266a5b92baa7e5a1 # v2.1.1

      - name: Decrypt .env
        run: |
          sops decrypt --input-type dotenv --output-type dotenv .env.enc > .env
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}

        # コメントと空行を除去してGITHUB_ENVへ
      - name: Export to env
        run: |
          grep -v '^\s*#' .env | grep -v '^\s*$' >> $GITHUB_ENV

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: 1.26

      - name: Build
        run: go build -o tester ./cmd/tester

      - name: Run Test
        id: run
        run: |
          set +x # コマンドの出力に機密情報が含まれる可能性があるため、出力を非表示にする 
          OUTPUT=$(./tester)
          MSG=$(echo "$OUTPUT" | grep SLACK_MESSAGE | cut -d '=' -f2-)
          echo "msg=$MSG" >> $GITHUB_OUTPUT

      - name: Notify Slack
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL"             -H 'Content-type: application/json'             --data "{\"text\":\"S3 Latency: ${{ steps.run.outputs.msg }}\"}"
